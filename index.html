<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The World of Lashes ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Pacifico&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS MAGIC - SAME VIBE, NEW PATHS */
        :root {
            --hot-pink: #ff4d94;
            --soft-pink: #ffb6c1;
            --lavender: #e6e6fa;
            --deep-purple: #6c429c;
            --magic-gold: #ffd700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Sparkle cursor! */
            cursor: url('https://cdn-icons-png.flaticon.com/32/1144/1144760.png'), auto; 
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite; 
            min-height: 100vh;
            color: var(--deep-purple);
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 8%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
        }

        .logo-area {
            display: flex;
            flex-direction: column;
        }

        .logo-main {
            font-family: 'Pacifico', cursive;
            font-size: 2.2rem;
            color: white;
            text-shadow: 2px 2px var(--hot-pink);
        }

        .logo-sub {
            font-size: 0.8rem;
            color: white;
            letter-spacing: 2px;
            font-weight: bold;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px; /* Adjusted for extra links */
        }

        nav a {
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            transition: 0.3s;
            padding: 8px 12px;
            border-radius: 20px;
        }

        nav a:hover {
            background: white;
            color: var(--hot-pink);
            transform: translateY(-3px);
        }

        /* Hero Section */
        .hero {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 100px);
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            padding: 60px;
            border-radius: 50px;
            text-align: center;
            max-width: 900px;
            border: 8px solid white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
        }

        .glass-card::before {
            content: '✨';
            position: absolute;
            top: -30px;
            left: -30px;
            font-size: 3rem;
        }

        .glass-card::after {
            content: '💖';
            position: absolute;
            bottom: -30px;
            right: -30px;
            font-size: 3rem;
        }

        h1 {
            font-family: 'Comfortaa', cursive;
            font-size: 4.5rem;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        h1 span {
            color: var(--hot-pink);
            display: block;
            font-family: 'Pacifico', cursive;
            font-size: 5.5rem;
        }

        .intro-text {
            font-size: 1.4rem;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .solulu-quote {
            background: var(--hot-pink);
            color: white;
            display: inline-block;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-style: italic;
            transform: rotate(-2deg);
            margin-bottom: 40px;
            box-shadow: 5px 5px 0px var(--deep-purple);
        }

        .cta-btn {
            display: inline-block;
            padding: 20px 50px;
            background: var(--deep-purple);
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 100px;
            transition: 0.4s;
            border: 4px solid white;
        }

        .cta-btn:hover {
            transform: scale(1.1) rotate(2deg);
            background: var(--hot-pink);
            box-shadow: 0 10px 20px rgba(255, 77, 148, 0.4);
        }

        .float {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
/* --- MOBILE OPTIMIZATION --- */
@media (max-width: 768px) {
    /* 1. Fix the Navigation */
    nav {
        flex-direction: column; /* Stacks logo on top of links */
        padding: 15px 5%;
        gap: 15px;
    }

    nav ul {
        gap: 10px;
        flex-wrap: wrap; /* Wraps links so they don't go off-screen */
        justify-content: center;
    }

    nav a {
        font-size: 0.85rem;
        padding: 5px 10px;
    }

    /* 2. Fix the Hero/Home Page Text */
    h1 {
        font-size: 2.5rem !important; /* Shrinks the giant text */
    }

    h1 span {
        font-size: 3.2rem !important;
    }

    .glass-card {
        padding: 30px 20px;
        margin: 10px;
        border-width: 4px; /* Slimmer borders for smaller screens */
    }

    .intro-text {
        font-size: 1.1rem;
    }

    .solulu-quote {
        font-size: 0.9rem;
        padding: 8px 15px;
    }

    /* 3. Fix the Works Grid */
    .works-grid {
        grid-template-columns: 1fr; /* One book per row on mobile */
        padding: 0 5%;
    }

    .book-card {
        padding: 20px;
    }

    .book-cover {
        height: 350px; /* Shorter covers so we don't scroll forever */
    }

    /* 4. Fix the Facts Sticker Wall */
    .facts-grid {
        grid-template-columns: 1fr;
    }

    .fact-sticker {
        transform: rotate(0deg) !important; /* No tilting on mobile to save space */
    }

    /* 5. Fix the Goddess Section */
    .goddess-callout h2 {
        font-size: 1.8rem;
    }
}
    </style>
</head>
<body>

    <nav>
        <div class="logo-area">
            <span class="logo-main">lashes</span>
            <span class="logo-sub">wild_imaginatorII</span>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="works.html">Works</a></li>
            <li><a href="facts.html">Facts</a></li>
            <li><a href="tips.html">Tips</a></li>
            <li><a href="archives.html">Archives</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main class="hero">
        <div class="glass-card float">
            <h1>Welcome to the <span>World of Lashes</span></h1>
            
            <p class="intro-text">
                Where words have wings, plots get messy, <br>
                and every story is a whole mood. 📖✨
            </p>

            <div class="solulu-quote">
                ✨ Delulu is the Solulu! ✨
            </div>

            <br>

            <a href="works.html" class="cta-btn">Explore My Books ➔</a>
        </div>
    </main>

</body>
</html>
